<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学基礎クイズ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="home-screen">
            <h1>化学基礎 クイズ</h1>
            <p>単元を選択してください。</p>
            <div id="unit-buttons"></div>
            
            <div id="home-ranking-area" class="ranking-box hidden">
                <h3 id="ranking-title">ランキング</h3>
                <div id="home-ranking-list"></div>
                <button id="start-confirm-button" class="start-btn">この単元で挑戦する！</button>
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="header">
                <span id="combo-display">Combo: 0</span>
                <span id="score-display">Score: 0</span>
            </div>
            <div id="timer-container">
                <div id="timer-bar"></div>
            </div>
            <h2 id="question-text"></h2>
            <div id="answer-buttons"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>結果発表</h2>
            <p id="final-score"></p>
            <input type="text" id="player-name" placeholder="名前（ニックネーム）" maxlength="10">
            <button id="save-button">ランキングに登録</button>
            <div id="result-ranking-list" class="ranking-box"></div>
            <button onclick="location.reload()" class="back-btn">ホームに戻る</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
